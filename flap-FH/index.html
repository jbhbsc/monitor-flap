<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>C罗金靴奖 · CR7 代币点赞活动</title>
    <!-- 引入 Google Fonts 提升字体质感 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 30%, #0a1f1a, #010101);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* 动态闪烁星星背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkle 3s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 2;
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* 右上角模拟钱包（静态装饰） */
        .wallet-mock {
            position: fixed;
            top: 20px;
            right: 25px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 8px 20px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .wallet-mock i {
            color: #f5b042;
            font-size: 1.1rem;
        }
        .wallet-mock span {
            color: #f0f0f0;
        }
        .wallet-mock:hover {
            background: rgba(255, 215, 0, 0.25);
            transform: scale(1.02);
        }

        /* 卡片风格 */
        .hero-card {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            border-radius: 64px;
            padding: 1.2rem;
            border: 1px solid rgba(255, 200, 50, 0.3);
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,215,0,0.1) inset;
            transition: all 0.3s ease;
        }

        .image-wrapper {
            position: relative;
            border-radius: 52px;
            overflow: hidden;
            box-shadow: 0 20px 35px -10px black;
        }

        .c-image {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }
        .image-wrapper:hover .c-image {
            transform: scale(1.02);
        }

        /* 巨大金色标题 */
        .gold-text {
            background: linear-gradient(135deg, #FFD966, #FFB347, #D4AF37);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.6);
            padding: 8px 24px;
            border-radius: 60px;
            font-weight: 700;
            backdrop-filter: blur(4px);
            margin-bottom: 20px;
            border-left: 4px solid #FFD966;
        }

        /* 点赞按钮 */
        .like-btn {
            background: linear-gradient(95deg, #E63946, #C72A3F);
            border: none;
            padding: 16px 42px;
            font-size: 1.8rem;
            font-weight: 800;
            border-radius: 80px;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 0 #7a1f2c;
            transition: 0.1s linear;
            display: inline-flex;
            align-items: center;
            gap: 18px;
            letter-spacing: 2px;
        }
        .like-btn:active {
            transform: translateY(4px);
            box-shadow: 0 6px 0 #7a1f2c;
        }
        .like-btn i {
            font-size: 2rem;
        }

        /* 输入框区域 */
        .input-area {
            margin-top: 40px;
            background: rgba(10, 20, 15, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 70px;
            padding: 20px 25px;
            border: 1px solid rgba(255,215,0,0.5);
            transition: all 0.2s;
        }
        .twitter-input {
            width: 100%;
            background: #1e2a2a;
            border: 2px solid #3e5a4b;
            border-radius: 60px;
            padding: 18px 24px;
            font-size: 1rem;
            color: #ffefcf;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
        }
        .twitter-input:focus {
            border-color: #F7C35C;
            box-shadow: 0 0 12px rgba(247,195,92,0.5);
            background: #0f1f1a;
        }
        .wallet-input {
            margin-top: 12px;
        }
        .submit-btn {
            background: linear-gradient(120deg, #F3B33D, #E8922A);
            border: none;
            padding: 14px 32px;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 60px;
            color: #1e2a1c;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 18px;
            width: 100%;
            font-weight: 800;
        }
        .submit-btn:hover {
            background: linear-gradient(120deg, #ffc85c, #f0a23a);
            transform: scale(1.01);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2f2a;
            backdrop-filter: blur(16px);
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            color: #ffeaac;
            border-left: 5px solid gold;
            z-index: 100;
            transition: 0.2s;
            pointer-events: none;
            font-size: 0.9rem;
        }

        footer {
            margin-top: 60px;
            font-size: 0.8rem;
            opacity: 0.7;
            text-align: center;
        }

        @media (max-width: 700px) {
            .like-btn { font-size: 1.2rem; padding: 12px 24px; gap: 10px;}
            .like-btn i { font-size: 1.4rem;}
            .hero-card { padding: 0.8rem; border-radius: 40px;}
            .wallet-mock { top: 12px; right: 12px; padding: 5px 15px; font-size: 0.75rem;}
            .input-area { border-radius: 40px; padding: 18px;}
        }
    </style>
</head>
<body>

<div class="stars" id="starsContainer"></div>

<!-- 静态钱包装饰 (右上角) -->
<div class="wallet-mock" id="mockWallet">
    <i class="fas fa-wallet"></i>
    <span>连接钱包</span>
    <i class="fas fa-chevron-down" style="font-size: 0.7rem;"></i>
</div>

<div class="main-container">
    <div class="hero-card" style="width: 100%;">
        <div class="image-wrapper">
            <!-- 大图: C罗高清图片 (使用高质量外部图床，确保稳定) -->
            <img class="c-image" src="https://images.pexels.com/photos/46798/the-ball-stadion-football-the-pitch-46798.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2" 
                 alt="Cristiano Ronaldo 金靴奖激情庆祝"
                 onerror="this.src='https://placehold.co/1200x800/1a2f2a/gold?text=CR7+KING'">
        </div>
        
        <!-- 内容区: 巨大C罗头衔+文案 -->
        <div style="text-align: center; margin-top: 30px; padding: 0 15px;">
            <div class="badge">
                <i class="fas fa-futbol" style="color:#FFD966;"></i>
                <span>BSC 传奇 • CR7 金靴荣耀</span>
                <i class="fas fa-crown" style="color:gold;"></i>
            </div>
            <h1 class="gold-text" style="font-size: clamp(3rem, 10vw, 6rem); font-weight: 800; letter-spacing: -1px; margin-bottom: 12px;">
                CRISTIANO <br> RONALDO
            </h1>
            <p style="font-size: 1.6rem; font-weight: 600; background: linear-gradient(120deg,#fff8e7,#FFD966); background-clip: text; -webkit-background-clip: text; color: transparent;">
                金靴奖得主 👑🏆
            </p>
            <p style="max-width: 700px; margin: 20px auto 0; font-size: 1rem; line-height: 1.4; color: #ddd;">
                为C罗加冕！持有CR7代币享受1.5%持币分红 & 自动LP金库。点击点赞，分享你支持的推文，赢取神秘空投！
            </p>
        </div>
    </div>

    <!-- 点赞按钮 + 输入框 核心区 -->
    <div style="margin-top: 55px; width: 100%; max-width: 680px;">
        <!-- 点赞按钮，点击后有反馈 -->
        <div style="display: flex; justify-content: center;">
            <button class="like-btn" id="likeButton">
                <i class="fas fa-heart"></i> 
                为C罗夺得金靴奖点赞
                <i class="fas fa-star-of-life" style="font-size: 1.2rem;"></i>
            </button>
        </div>

        <!-- 下方输入框区 (点赞后显现动画) -->
        <div id="inputSection" style="margin-top: 40px; transition: all 0.4s ease; opacity: 0; transform: translateY(20px); pointer-events: none;">
            <div class="input-area">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 10px;">
                    <i class="fab fa-twitter" style="font-size: 1.8rem; color:#1DA1F2;"></i>
                    <span style="font-weight: 700; font-size: 1.2rem;">填写推文链接，记录地址并领取奖励</span>
                </div>
                <input type="text" id="tweetLinkInput" class="twitter-input" placeholder="https://x.com/Cristiano/status/123456789 ...">
                <input type="text" id="walletAddressInput" class="twitter-input wallet-input" placeholder="钱包地址：连接钱包后自动填写，也可手动填写 0x...">
                <button id="submitLinkBtn" class="submit-btn">
                    <i class="fas fa-link"></i> 填入链接并自动记录地址
                </button>
                <p style="font-size: 0.75rem; margin-top: 12px; color: #bbaa77;">
                    * 提交后系统会保存推文链接和钱包地址，管理员可在后台查看。
                </p>
            </div>
        </div>
    </div>

    <footer>
        ⚡ CR7 Token on BSC | 反射分红 + 自动流动性 | 与传奇同行
    </footer>
</div>

<script>
    // 生成随机星星背景
    function createStars() {
        const container = document.getElementById('starsContainer');
        for (let i = 0; i < 180; i++) {
            let star = document.createElement('div');
            star.classList.add('star');
            let size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            star.style.animationDuration = Math.random() * 3 + 2 + 's';
            container.appendChild(star);
        }
    }
    createStars();

    // 点赞交互 + 显示输入框
    const likeBtn = document.getElementById('likeButton');
    const inputSection = document.getElementById('inputSection');
    let liked = false;

    likeBtn.addEventListener('click', () => {
        if (!liked) {
            // 改变按钮样式，增加动效
            likeBtn.style.transform = 'scale(0.97)';
            setTimeout(() => { likeBtn.style.transform = ''; }, 150);
            // 弹出点赞成功的反馈
            showToast('❤️ 感谢支持C罗！ 请在下方填写您的推文链接 ❤️');
            // 显示输入框 + 平滑动画
            inputSection.style.opacity = '1';
            inputSection.style.transform = 'translateY(0px)';
            inputSection.style.pointerEvents = 'auto';
            liked = true;
            // 可选: 改变按钮文字
            likeBtn.innerHTML = '<i class="fas fa-check-circle"></i> 已点赞！感谢支持 <i class="fas fa-trophy"></i>';
            likeBtn.style.background = "linear-gradient(95deg, #2b7a4b, #1f543a)";
            likeBtn.style.boxShadow = "0 10px 0 #0e3a27";
        } else {
            showToast('您已经为C罗点过赞了！可以直接提交链接✨');
        }
    });

    // 提交链接按钮逻辑：连接钱包并保存到后台
    const submitBtn = document.getElementById('submitLinkBtn');
    const tweetInput = document.getElementById('tweetLinkInput');
    const walletAddressInput = document.getElementById('walletAddressInput');
    const walletSpan = document.querySelector('.wallet-mock span');
    let walletAddress = localStorage.getItem('flap_wallet_address') || '';

    function isAddress(value) {
        return /^0x[a-fA-F0-9]{40}$/.test((value || '').trim());
    }

    function showWallet(address) {
        walletAddress = address || '';
        if (walletAddress) {
            localStorage.setItem('flap_wallet_address', walletAddress);
            walletAddressInput.value = walletAddress;
            walletSpan.innerText = walletAddress.slice(0, 6) + '...' + walletAddress.slice(-4);
        } else {
            walletSpan.innerText = '连接钱包';
        }
    }

    async function connectWallet() {
        if (!window.ethereum) {
            showToast('未检测到钱包插件，请手动填写钱包地址。');
            walletAddressInput.focus();
            return;
        }
        try {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            showWallet(accounts[0] || '');
            showToast('钱包已连接。');
        } catch (error) {
            showToast(error.message || '连接钱包失败。');
        }
    }

    showWallet(walletAddress);

    document.getElementById('mockWallet').addEventListener('click', connectWallet);
    walletAddressInput.addEventListener('input', () => {
        walletAddress = walletAddressInput.value.trim();
        if (isAddress(walletAddress)) {
            localStorage.setItem('flap_wallet_address', walletAddress);
            walletSpan.innerText = walletAddress.slice(0, 6) + '...' + walletAddress.slice(-4);
        }
    });

    // 提交处理： 记录推文链接 + 地址
    submitBtn.addEventListener('click', async () => {
        const link = tweetInput.value.trim();
        const address = walletAddressInput.value.trim();
        if (!link) {
            showToast('❌ 请输入推文链接！例如：https://x.com/...');
            return;
        }
        if (!link.includes('x.com') && !link.includes('twitter.com')) {
            showToast('⚠️ 请填写有效的X/Twitter推文链接');
            return;
        }
        if (!isAddress(address)) {
            showToast('⚠️ 请连接钱包，或填写有效的 0x 钱包地址。');
            walletAddressInput.focus();
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 正在提交...';
        try {
            const response = await fetch('/api/submissions', {
                method: 'POST',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify({ tweetLink: link, walletAddress: address })
            });
            const raw = await response.text();
            let data;
            try {
                data = raw ? JSON.parse(raw) : null;
            } catch (error) {
                data = null;
            }
            if (!data) {
                showToast('后台接口没有返回数据，请用 npm.cmd start 启动后访问 http://localhost:4208');
                return;
            }
            if (!response.ok || !data.ok) {
                showToast(data.message || '提交失败，请稍后再试。');
                return;
            }
            showWallet(address);
            tweetInput.value = '';
            showToast(`✅ 已保存到后台！地址 ${address.slice(0,6)}... 等待管理员审核`);
        } catch (error) {
            showToast(error.message || '提交失败，请检查网络。');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-link"></i> 填入链接并自动记录地址';
        }
    });

    if (window.ethereum) {
        window.ethereum.request({ method: 'eth_accounts' }).then((accounts) => {
            if (accounts[0]) showWallet(accounts[0]);
        }).catch(() => {});
        window.ethereum.on && window.ethereum.on('accountsChanged', (accounts) => {
            showWallet(accounts[0] || '');
        });
    }

    // 简易Toast通知
    function showToast(msg) {
        let existingToast = document.querySelector('.toast-msg');
        if(existingToast) existingToast.remove();
        let toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerHTML = `<i class="fas fa-bell"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 2800);
    }

    // 假如用户没有点赞直接点击输入框？优雅处理
    tweetInput.addEventListener('focus', () => {
        if (!liked) {
            showToast('👏 请先点击上方点赞按钮，再填写推文链接~');
            tweetInput.blur();
        }
    });

    // 一些进场动画
    window.addEventListener('load', () => {
        document.querySelector('.hero-card').style.opacity = '0';
        document.querySelector('.hero-card').style.transform = 'translateY(20px)';
        setTimeout(() => {
            document.querySelector('.hero-card').style.transition = 'all 0.6s ease';
            document.querySelector('.hero-card').style.opacity = '1';
            document.querySelector('.hero-card').style.transform = 'translateY(0)';
        }, 100);
    });
</script>
</body>
</html>
